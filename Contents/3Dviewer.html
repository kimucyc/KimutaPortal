<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>FBX Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: sans-serif;
      z-index: 10;
    }
  </style>
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
      }
    }
  </script>
</head>
<body>

<div id="ui">
  <input type="file" id="fileInput" accept=".fbx">
  <div>左ドラッグ: 回転 / 右ドラッグ: スライド / ホイール: ズーム</div>
</div>

<script type="module">
// Import Mapのおかげで、パスをシンプルに書けるようになり、内部依存のエラーも解消されます
import * as THREE from 'three';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls;
let currentModel;

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x20232a);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // ライト
  const light = new THREE.DirectionalLight(0xffffff, 2);
  light.position.set(5, 10, 5);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0xffffff, 1));

  // グリッド
  const grid = new THREE.GridHelper(20, 20);
  scene.add(grid);

  // 操作
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // ファイル読み込み
  document.getElementById('fileInput').addEventListener('change', handleFile);

  window.addEventListener('resize', onResize);
}

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const loader = new FBXLoader();
    const object = loader.parse(e.target.result);

    if (currentModel) scene.remove(currentModel);

    currentModel = object;
    scene.add(object);

    fitCameraToObject(object);
  };
  reader.readAsArrayBuffer(file);
}

function fitCameraToObject(object) {
  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  const maxDim = Math.max(size.x, size.y, size.z);
  const fov = camera.fov * (Math.PI / 180);
  let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2)) * 1.5;

  camera.position.set(center.x, center.y + size.y * 0.5, center.z + cameraZ);
  controls.target.copy(center);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
</script>

</body>
</html>
