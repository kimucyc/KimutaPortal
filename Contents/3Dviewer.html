<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBX Free Camera Viewer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-family: sans-serif;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h2>FBX Viewer</h2>
        <p>画面をクリックして操作開始 (ESCキーで解除)</p>
        <p>W A S D : 前後左右の移動 | Space : 上昇 | Shift : 下降 | マウス : 視点移動</p>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. 基本セットアップ（シーン、カメラ、レンダラー）
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333344);
        scene.fog = new THREE.Fog(0x333344, 10, 500);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. 照明の設定
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        hemiLight.position.set(0, 200, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(0, 200, 100);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 空間の目安となるグリッドと軸を表示
        const gridHelper = new THREE.GridHelper(100, 100);
        scene.add(gridHelper);
        const axesHelper = new THREE.AxesHelper(5);
        scene.add(axesHelper);

        // 3. FBXモデルの読み込み
        const loader = new FBXLoader();
        // ★ ここを自身のFBXファイル名に変更してください ★
        loader.load('model/room01.fbx', function (object) {
            // モデルのスケール調整（FBXは出力元によってスケールが極端な場合があるため）
            object.scale.set(0.01, 0.01, 0.01); 
            scene.add(object);
            console.log('FBXの読み込みに成功しました');
        }, undefined, function (error) {
            console.error('FBXの読み込みエラー:', error);
        });

        // 4. コントロールの設定（PointerLockControls）
        const controls = new PointerLockControls(camera, document.body);
        const crosshair = document.getElementById('crosshair');
        const uiLayer = document.getElementById('ui-layer');

        document.body.addEventListener('click', () => {
            controls.lock();
        });

        controls.addEventListener('lock', () => {
            uiLayer.style.display = 'none';
            crosshair.style.display = 'block';
        });

        controls.addEventListener('unlock', () => {
            uiLayer.style.display = 'block';
            crosshair.style.display = 'none';
        });
        scene.add(controls.getObject());

        // 5. キーボード入力による移動ロジック
        const moveState = { forward: false, backward: false, left: false, right: false, up: false, down: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const speed = 50.0; // 移動速度

        document.addEventListener('keydown', (event) => {
            switch (event.code) {
                case 'KeyW': moveState.forward = true; break;
                case 'KeyA': moveState.left = true; break;
                case 'KeyS': moveState.backward = true; break;
                case 'KeyD': moveState.right = true; break;
                case 'Space': moveState.up = true; break;
                case 'ShiftLeft':
                case 'ShiftRight': moveState.down = true; break;
            }
        });

        document.addEventListener('keyup', (event) => {
            switch (event.code) {
                case 'KeyW': moveState.forward = false; break;
                case 'KeyA': moveState.left = false; break;
                case 'KeyS': moveState.backward = false; break;
                case 'KeyD': moveState.right = false; break;
                case 'Space': moveState.up = false; break;
                case 'ShiftLeft':
                case 'ShiftRight': moveState.down = false; break;
            }
        });

        // 6. アニメーションループ
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (controls.isLocked) {
                // 摩擦（慣性）の適用
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= velocity.y * 10.0 * delta;

                // 入力方向のベクトル計算
                direction.z = Number(moveState.forward) - Number(moveState.backward);
                direction.x = Number(moveState.right) - Number(moveState.left);
                direction.y = Number(moveState.up) - Number(moveState.down);
                direction.normalize(); // 斜め移動が速くならないように正規化

                if (moveState.forward || moveState.backward) velocity.z -= direction.z * speed * delta;
                if (moveState.left || moveState.right) velocity.x -= direction.x * speed * delta;
                if (moveState.up || moveState.down) velocity.y += direction.y * speed * delta;

                // カメラの座標を更新
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += velocity.y * delta; // グローバルY軸での上下移動
            }

            renderer.render(scene, camera);
        }

        // ウィンドウリサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
