<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FBX Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px;
      width: min(360px, calc(100vw - 32px));
      box-sizing: border-box;
      backdrop-filter: blur(6px);
    }

    #ui h1 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    #ui p {
      margin: 6px 0;
      font-size: 13px;
      line-height: 1.5;
      color: #d8d8d8;
    }

    #fileInput {
      width: 100%;
      margin: 10px 0 12px;
      color: #fff;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      background: #4b7cff;
      color: white;
      font-size: 13px;
    }

    button.secondary {
      background: #3a3a3a;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #b9d4ff;
      min-height: 18px;
      word-break: break-word;
    }

    #help {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .kbd {
      display: inline-block;
      background: #2d2d2d;
      border: 1px solid rgba(255,255,255,0.16);
      border-bottom-width: 2px;
      padding: 1px 6px;
      border-radius: 6px;
      font-size: 12px;
      color: #fff;
      margin: 0 2px;
    }

    #dropHint {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(75, 124, 255, 0.12);
      border: 2px dashed rgba(130, 170, 255, 0.7);
      z-index: 9;
      font-size: 24px;
      color: #dce7ff;
      pointer-events: none;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h1>FBX Viewer</h1>
      <p>FBXファイルを選ぶと、3Dモデルを画面に表示できます。</p>
      <input id="fileInput" type="file" accept=".fbx" />

      <div class="row">
        <button id="resetViewBtn">視点をリセット</button>
        <button id="fitBtn" class="secondary">モデルに合わせる</button>
      </div>

      <div id="status">FBXファイルを選択してください。</div>

      <div id="help">
        <p><span class="kbd">左ドラッグ</span> 回転</p>
        <p><span class="kbd">ホイール</span> ズーム</p>
        <p><span class="kbd">中ドラッグ</span> 平行移動</p>
        <p><span class="kbd">W / S</span> 前後ズーム</p>
        <p><span class="kbd">A / D</span> 左右スライド</p>
        <p><span class="kbd">Q / E</span> 上下スライド</p>
      </div>
    </div>

    <div id="dropHint">ここに FBX をドロップ</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { FBXLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/FBXLoader.js';

    const app = document.getElementById('app');
    const fileInput = document.getElementById('fileInput');
    const statusEl = document.getElementById('status');
    const resetViewBtn = document.getElementById('resetViewBtn');
    const fitBtn = document.getElementById('fitBtn');
    const dropHint = document.getElementById('dropHint');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x202025);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 5000);
    camera.position.set(0, 1.5, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.rotateSpeed = 0.9;
    controls.panSpeed = 1.0;
    controls.zoomSpeed = 1.2;
    controls.screenSpacePanning = true;
    controls.target.set(0, 1, 0);
    controls.mouseButtons.LEFT = THREE.MOUSE.ROTATE;
    controls.mouseButtons.MIDDLE = THREE.MOUSE.PAN;
    controls.mouseButtons.RIGHT = THREE.MOUSE.PAN;

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.4);
    hemiLight.position.set(0, 20, 0);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(20, 20, 0x666666, 0x333333);
    scene.add(grid);

    const axes = new THREE.AxesHelper(1.5);
    scene.add(axes);

    let currentModel = null;
    let mixer = null;
    const clock = new THREE.Clock();

    const keyState = {
      KeyW: false,
      KeyA: false,
      KeyS: false,
      KeyD: false,
      KeyQ: false,
      KeyE: false,
    };

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? '#ff9c9c' : '#b9d4ff';
    }

    function clearCurrentModel() {
      if (!currentModel) return;

      scene.remove(currentModel);
      currentModel.traverse((child) => {
        if (child.isMesh) {
          child.geometry?.dispose?.();

          if (Array.isArray(child.material)) {
            child.material.forEach((mat) => mat?.dispose?.());
          } else {
            child.material?.dispose?.();
          }
        }
      });

      currentModel = null;
      mixer = null;
    }

    function fitCameraToObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxSize = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * (Math.PI / 180);
      let distance = maxSize / (2 * Math.tan(fov / 2));
      distance *= 1.6;

      const dir = new THREE.Vector3(1, 0.8, 1).normalize();
      camera.position.copy(center).add(dir.multiplyScalar(distance));
      controls.target.copy(center);
      controls.update();

      camera.near = Math.max(0.01, distance / 1000);
      camera.far = Math.max(1000, distance * 20);
      camera.updateProjectionMatrix();
    }

    function normalizeModel(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      object.position.sub(center);

      const maxAxis = Math.max(size.x, size.y, size.z);
      if (maxAxis > 0) {
        const targetSize = 2.5;
        const scale = targetSize / maxAxis;
        object.scale.multiplyScalar(scale);
      }

      const newBox = new THREE.Box3().setFromObject(object);
      const minY = newBox.min.y;
      object.position.y -= minY;
    }

    function applyDefaultMaterials(object) {
      object.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;

          if (!child.material) {
            child.material = new THREE.MeshStandardMaterial({ color: 0xcccccc });
          }
        }
      });
    }

    async function loadFBXFromFile(file) {
      if (!file) return;

      if (!file.name.toLowerCase().endsWith('.fbx')) {
        setStatus('FBXファイルを選んでください。', true);
        return;
      }

      setStatus('読み込み中です...');
      clearCurrentModel();

      const loader = new FBXLoader();
      const objectURL = URL.createObjectURL(file);

      try {
        const object = await loader.loadAsync(objectURL);

        applyDefaultMaterials(object);
        normalizeModel(object);
        scene.add(object);
        currentModel = object;

        if (object.animations && object.animations.length > 0) {
          mixer = new THREE.AnimationMixer(object);
          const action = mixer.clipAction(object.animations[0]);
          action.play();
        }

        fitCameraToObject(object);
        setStatus('読み込み完了: ' + file.name);
      } catch (error) {
        console.error(error);
        setStatus('読み込みに失敗しました。FBXの形式や関連データを確認してください。', true);
      } finally {
        URL.revokeObjectURL(objectURL);
      }
    }

    function resetView() {
      camera.position.set(0, 1.5, 5);
      controls.target.set(0, 1, 0);
      controls.update();
    }

    function moveCameraByKeyboard(delta) {
      const speed = 3.0 * delta;

      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);
      forward.normalize();

      const right = new THREE.Vector3();
      right.crossVectors(forward, camera.up).normalize();

      const up = new THREE.Vector3().copy(camera.up).normalize();

      const move = new THREE.Vector3();

      if (keyState.KeyW) move.add(forward);
      if (keyState.KeyS) move.sub(forward);
      if (keyState.KeyD) move.add(right);
      if (keyState.KeyA) move.sub(right);
      if (keyState.KeyE) move.add(up);
      if (keyState.KeyQ) move.sub(up);

      if (move.lengthSq() === 0) return;

      move.normalize().multiplyScalar(speed);
      camera.position.add(move);
      controls.target.add(move);
    }

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      loadFBXFromFile(file);
    });

    resetViewBtn.addEventListener('click', () => {
      resetView();
      if (currentModel) fitCameraToObject(currentModel);
    });

    fitBtn.addEventListener('click', () => {
      if (currentModel) {
        fitCameraToObject(currentModel);
      } else {
        resetView();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('keydown', (event) => {
      if (event.code in keyState) {
        keyState[event.code] = true;
      }
    });

    window.addEventListener('keyup', (event) => {
      if (event.code in keyState) {
        keyState[event.code] = false;
      }
    });

    app.addEventListener('dragenter', (event) => {
      event.preventDefault();
      dropHint.style.display = 'flex';
    });

    app.addEventListener('dragover', (event) => {
      event.preventDefault();
      dropHint.style.display = 'flex';
    });

    app.addEventListener('dragleave', (event) => {
      if (event.target === app || event.target === dropHint) {
        dropHint.style.display = 'none';
      }
    });

    app.addEventListener('drop', (event) => {
      event.preventDefault();
      dropHint.style.display = 'none';
      const file = event.dataTransfer?.files?.[0];
      loadFBXFromFile(file);
    });

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      moveCameraByKeyboard(delta);
      controls.update();
      mixer?.update(delta);
      renderer.render(scene, camera);
    }

    resetView();
    animate();
  </script>
</body>
</html>
